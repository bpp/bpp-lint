name: ci

# Build + smoke-test on every push to main and every PR. Mirrors the
# matrix used by release.yml so platform regressions are caught before
# tag time, but skips the archive/release steps.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when new commits land on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            os: ubuntu-latest
            bin: ./bpp-lint
            cross_arch: ''
          - target: macos-arm64
            os: macos-14
            bin: ./bpp-lint
            cross_arch: ''
          - target: macos-x86_64
            os: macos-14            # cross-compile on Apple Silicon
            bin: ./bpp-lint
            cross_arch: x86_64      # see EXTRA_CFLAGS in Makefile
          - target: windows-x86_64
            os: windows-latest
            bin: ./bpp-lint.exe
            cross_arch: ''

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (Windows only)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            mingw-w64-x86_64-gcc

      - name: Build (Unix, native)
        if: matrix.os != 'windows-latest' && matrix.cross_arch == ''
        run: make

      - name: Build (macOS cross-compile to ${{ matrix.cross_arch }})
        if: matrix.cross_arch != '' && matrix.os == 'macos-14'
        run: make EXTRA_CFLAGS="-arch ${{ matrix.cross_arch }}" EXTRA_LDFLAGS="-arch ${{ matrix.cross_arch }}"

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: make BIN=bpp-lint.exe

      - name: Verify binary arch (macOS cross-build)
        if: matrix.cross_arch != '' && matrix.os == 'macos-14'
        run: |
          file bpp-lint
          file bpp-lint | grep -q "${{ matrix.cross_arch }}"

      # Smoke tests: invoke the binary on each fixture and assert the
      # documented exit code. Skipped for cross-compiled binaries (the
      # native arch run on this OS already covers behavior).
      - name: Smoke test
        if: matrix.cross_arch == ''
        shell: bash
        run: |
          set -euo pipefail
          BIN="${{ matrix.bin }}"

          echo "::group::--version / --list-codes / --explain"
          "$BIN" --version
          "$BIN" --list-codes | head -5
          "$BIN" --explain 020 | head -3
          echo "::endgroup::"

          echo "::group::modern-4x.bpp.ctl should exit 0"
          "$BIN" --color=never examples/modern-4x.bpp.ctl
          echo "::endgroup::"

          echo "::group::legacy-3x.bpp.ctl should exit 1"
          if "$BIN" --color=never examples/legacy-3x.bpp.ctl; then
            echo "expected exit 1 but got 0" >&2
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::cross-checks.bpp.ctl should fire BPP120/122/123/124"
          out=$("$BIN" --color=never --codes --no-defaults examples/cross-checks.bpp.ctl 2>&1 || true)
          echo "$out"
          for code in 120 122 123 124; do
            if ! echo "$out" | grep -q "\[$code\]"; then
              echo "expected diagnostic [$code] not found" >&2
              exit 1
            fi
          done
          echo "::endgroup::"
